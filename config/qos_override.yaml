# ─────────────────────────────────────────────────────────────
# QoS Override — disesuaikan dengan isi rosbag
# rosbag2_2026_04_10-03_17_38
#
# Cara pakai (sudah dihandle otomatis oleh launch file,
# tapi bisa juga dipakai manual):
#
#   ros2 bag play ~/ws/rosbag2_2026_04_10-03_17_38 \
#     --clock --rate 0.5 \
#     --qos-profile-overrides-path qos_override.yaml
# ─────────────────────────────────────────────────────────────

# ── LiDAR ─────────────────────────────────────────────────────
/velodyne_points:
  publisher:
    reliability: best_effort
    durability: volatile
    history: keep_last
    depth: 5
  subscription:
